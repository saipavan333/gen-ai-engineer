<rect x="0" y="0" width="900" height="250" fill="#ffffff"/>
<text x="450" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Two-stage retrieval: recall first, precision second</text>
<rect x="24" y="94.5" width="120" height="70" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="24" y="97" width="120" height="70" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="24" y="92" width="120" height="70" rx="13" ry="13" fill="url(#g_note)" stroke="#64748b" stroke-width="1.8"/>
<text x="84.0" y="127.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Query</text>
<rect x="180" y="94.5" width="190" height="70" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="180" y="97" width="190" height="70" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="180" y="92" width="190" height="70" rx="13" ry="13" fill="url(#g_accent)" stroke="#4f46e5" stroke-width="1.8"/>
<text x="275.0" y="112.5" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#312e81" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Vector search</text>
<text x="275.0" y="125.5" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">bi-encoder · fast</text>
<text x="275.0" y="139.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">→ top 50 candidates</text>
