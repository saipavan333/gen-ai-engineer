<text x="505.0" y="125.5" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">cross-encoder · slow</text>
<text x="505.0" y="139.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">scores each pair</text>
<rect x="640" y="94.5" width="190" height="70" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
