<text x="735.0" y="119.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#14532d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Top 5</text>
<text x="735.0" y="132.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">best, in order</text>
<line x1="144" y1="127" x2="166.0" y2="127.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
