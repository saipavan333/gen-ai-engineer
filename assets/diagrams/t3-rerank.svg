<rect x="410" y="97" width="190" height="70" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="410" y="92" width="190" height="70" rx="13" ry="13" fill="url(#g_key)" stroke="#d97706" stroke-width="1.8"/>
