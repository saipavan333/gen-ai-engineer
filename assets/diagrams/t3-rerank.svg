<polygon points="408.0,127.0 396.0,131.8 396.0,122.2" fill="#475569"/>
<line x1="600" y1="127" x2="626.0" y2="127.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="638.0,127.0 626.0,131.8 626.0,122.2" fill="#475569"/>
<text x="450" y="206" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Stage 1 casts a wide, cheap net; stage 2 carefully reorders the shortlist for quality.</text>
</svg>
