<line x1="540" y1="180" x2="599.015530641425" y2="183.47150180243676" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
<polygon points="608.0,184.0 598.8,187.1 599.2,179.9" fill="#dc2626"/>
<text x="575" y="200" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10" fill="#b91c1c" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">fail</text>
<text x="450" y="262" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Never feed raw model output into actions, HTML, or queries unchecked — treat it as untrusted.</text>
</svg>
