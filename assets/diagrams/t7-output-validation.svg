<text x="105.0" y="150.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">LLM output</text>
<rect x="240" y="80" width="300" height="140" rx="12" ry="12" fill="#fff6ea" stroke="#d97706" stroke-width="2"/>
<text x="390" y="104" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#7c2d12" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Validate</text>
<text x="262" y="132" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• valid schema / parses</text>
<text x="262" y="154" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• no secrets or PII leaked</text>
<text x="262" y="176" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• no unsafe HTML / scripts</text>
<text x="262" y="198" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• values within allowed set</text>
