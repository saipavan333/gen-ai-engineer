<text x="675.0" y="106.5" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#14532d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Use it</text>
<text x="675.0" y="119.5" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">✓</text>
<rect x="610" y="162.5" width="130" height="50" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="610" y="165" width="130" height="50" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
