<text x="675.0" y="185.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#7f1d1d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Reject / retry</text>
<line x1="180" y1="150" x2="226.0" y2="150.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="238.0,150.0 226.0,154.8 226.0,145.2" fill="#475569"/>
<line x1="540" y1="120" x2="599.0616445610941" y2="113.05157122810658" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
