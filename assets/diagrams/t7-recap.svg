<rect x="0" y="0" width="880" height="380" fill="#ffffff"/>
<text x="440" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Threat → defense map</text>
<rect x="24" y="66" width="300" height="50" rx="9" ry="9" fill="#fef1ef" stroke="#dc2626" stroke-width="2"/>
