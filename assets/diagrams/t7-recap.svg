<line x1="330" y1="151.0" x2="357.0" y2="151.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="366.0,151.0 357.0,154.6 357.0,147.4" fill="#94a3b8"/>
