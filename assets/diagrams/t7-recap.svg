<line x1="330" y1="271.0" x2="357.0" y2="271.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="366.0,271.0 357.0,274.6 357.0,267.4" fill="#94a3b8"/>
<rect x="372" y="246" width="484" height="50" rx="9" ry="9" fill="#eef0fe" stroke="#4f46e5" stroke-width="2"/>
<text x="388" y="271.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#312e81" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Input &amp; output moderation classifiers</text>
<rect x="24" y="306" width="300" height="50" rx="9" ry="9" fill="#fef1ef" stroke="#dc2626" stroke-width="2"/>
<text x="40" y="331.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#7f1d1d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Harmful actions</text>
<line x1="330" y1="331.0" x2="357.0" y2="331.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="366.0,331.0 357.0,334.6 357.0,327.4" fill="#94a3b8"/>
<rect x="372" y="306" width="484" height="50" rx="9" ry="9" fill="#eef0fe" stroke="#4f46e5" stroke-width="2"/>
<text x="388" y="331.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#312e81" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Output validation + human approval for risky ops</text>
<text x="440" y="366" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">…and monitor everything, so the threats that slip through get caught and fixed.</text>
