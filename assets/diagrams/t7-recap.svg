<line x1="330" y1="91.0" x2="357.0" y2="91.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="366.0,91.0 357.0,94.6 357.0,87.4" fill="#94a3b8"/>
<rect x="372" y="66" width="484" height="50" rx="9" ry="9" fill="#eef0fe" stroke="#4f46e5" stroke-width="2"/>
<text x="388" y="91.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#312e81" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Fence input as data + least-privilege tools</text>
