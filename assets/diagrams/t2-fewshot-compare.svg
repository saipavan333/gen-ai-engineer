<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 350" width="840" height="350" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif">
<defs>
<linearGradient id="g_concept" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eff5ff"/><stop offset="1" stop-color="#dde9ff"/></linearGradient>
<linearGradient id="g_example" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eefaf0"/><stop offset="1" stop-color="#d7f1de"/></linearGradient>
<linearGradient id="g_key" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff6ea"/><stop offset="1" stop-color="#ffecca"/></linearGradient>
<linearGradient id="g_practice" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0ff"/><stop offset="1" stop-color="#e7defb"/></linearGradient>
<linearGradient id="g_deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eafaf6"/><stop offset="1" stop-color="#d3f1ea"/></linearGradient>
<linearGradient id="g_note" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#e5edf6"/></linearGradient>
<linearGradient id="g_warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fef1ef"/><stop offset="1" stop-color="#fde2dd"/></linearGradient>
<linearGradient id="g_ink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef2f7"/><stop offset="1" stop-color="#dfe6f0"/></linearGradient>
<linearGradient id="g_plain" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fc"/></linearGradient>
<linearGradient id="g_accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0fe"/><stop offset="1" stop-color="#dfe2fd"/></linearGradient>
</defs>
<rect x="0" y="0" width="840" height="350" fill="#ffffff"/>
<text x="420" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Show, don’t just tell</text>
<text x="212" y="64" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14.5" fill="#b45309" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Zero-shot  (just ask)</text>
<rect x="36" y="82" width="352" height="70" rx="10" ry="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
<text x="52" y="104.25" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Classify the sentiment:</text>
<text x="52" y="124.25" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"The checkout kept crashing."</text>
<line x1="212" y1="152" x2="212.0" y2="179.0" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="212.0,190.0 207.6,179.0 216.4,179.0" fill="#94a3b8"/>
<rect x="36" y="196" width="352" height="96" rx="10" ry="10" fill="#fef1ef" stroke="#dc2626" stroke-width="2"/>
<text x="52" y="218.25" font-family="DejaVu Sans, sans-serif" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"This likely reflects a negative</text>
<text x="52" y="238.25" font-family="DejaVu Sans, sans-serif" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve"> user experience that could be</text>
<text x="52" y="258.25" font-family="DejaVu Sans, sans-serif" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve"> frustrating…"  (shape varies!)</text>
<text x="628" y="64" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14.5" fill="#15803d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Few-shot  (give examples)</text>
<rect x="452" y="82" width="352" height="96" rx="10" ry="10" fill="#eff5ff" stroke="#2563eb" stroke-width="2"/>
<text x="468" y="104.25" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"Great product"        → positive</text>
<text x="468" y="124.25" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"Never buying again"   → negative</text>
<text x="468" y="144.25" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"The checkout kept crashing." →</text>
<line x1="628" y1="178" x2="628.0" y2="205.0" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="628.0,216.0 623.6,205.0 632.4,205.0" fill="#94a3b8"/>
<rect x="452" y="222" width="352" height="50" rx="10" ry="10" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="468" y="245.0" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">negative</text>
<text x="420" y="330" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">A few labeled examples pin both the task and the exact output shape.</text>
</svg>
