<polygon points="598.0,151.0 586.0,155.8 586.0,146.2" fill="#475569"/>
<text x="450" y="256" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Use a strong model + a clear rubric; then validate the judge against human labels so you can trust it.</text>
<text x="450" y="280" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Great for fuzzy quality (helpfulness, faithfulness) where exact-match scoring breaks.</text>
