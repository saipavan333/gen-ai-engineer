<rect x="0" y="0" width="900" height="300" fill="#ffffff"/>
<text x="450" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Planning: break a goal into steps, then execute</text>
<rect x="28" y="124.5" width="120" height="58" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
