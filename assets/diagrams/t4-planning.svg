<line x1="770" y1="151" x2="786.0" y2="151.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="798.0,151.0 786.0,155.8 786.0,146.2" fill="#475569"/>
<text x="450" y="286" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Plan-then-execute makes long tasks reliable and debuggable — each step is checkable.</text>
