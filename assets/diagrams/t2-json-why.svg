<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" width="840" height="300" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif">
<defs>
<linearGradient id="g_concept" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eff5ff"/><stop offset="1" stop-color="#dde9ff"/></linearGradient>
<linearGradient id="g_example" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eefaf0"/><stop offset="1" stop-color="#d7f1de"/></linearGradient>
<linearGradient id="g_key" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff6ea"/><stop offset="1" stop-color="#ffecca"/></linearGradient>
<linearGradient id="g_practice" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0ff"/><stop offset="1" stop-color="#e7defb"/></linearGradient>
<linearGradient id="g_deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eafaf6"/><stop offset="1" stop-color="#d3f1ea"/></linearGradient>
<linearGradient id="g_note" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#e5edf6"/></linearGradient>
<linearGradient id="g_warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fef1ef"/><stop offset="1" stop-color="#fde2dd"/></linearGradient>
<linearGradient id="g_ink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef2f7"/><stop offset="1" stop-color="#dfe6f0"/></linearGradient>
<linearGradient id="g_plain" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fc"/></linearGradient>
<linearGradient id="g_accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0fe"/><stop offset="1" stop-color="#dfe2fd"/></linearGradient>
</defs>
<rect x="0" y="0" width="840" height="300" fill="#ffffff"/>
<text x="420" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Make outputs your software can read</text>
<text x="212" y="62" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#b45309" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Prose  (hard to use)</text>
<rect x="36" y="80" width="352" height="70" rx="10" ry="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
<text x="52" y="101.3" font-family="DejaVu Sans, sans-serif" font-size="12.6" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"The customer seems upset about a</text>
<text x="52" y="121.3" font-family="DejaVu Sans, sans-serif" font-size="12.6" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve"> double charge and wants a refund."</text>
<line x1="212" y1="150" x2="212.0" y2="175.0" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="212.0,186.0 207.6,175.0 216.4,175.0" fill="#94a3b8"/>
<rect x="36" y="192" width="352" height="70" rx="10" ry="10" fill="#fef1ef" stroke="#dc2626" stroke-width="2"/>
<text x="52" y="213.3" font-family="DejaVu Sans, sans-serif" font-size="12.6" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Code must guess fields from text</text>
<text x="52" y="233.3" font-family="DejaVu Sans, sans-serif" font-size="12.6" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">→ fragile string parsing, breaks often</text>
<text x="628" y="62" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#15803d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">JSON  (easy to use)</text>
<rect x="452" y="80" width="352" height="70" rx="10" ry="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
<text x="468" y="100.75" font-family="DejaVu Sans Mono, monospace" font-size="11.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">{"intent": "refund",</text>
<text x="468" y="120.75" font-family="DejaVu Sans Mono, monospace" font-size="11.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve"> "sentiment": "negative", "urgent": true}</text>
<line x1="628" y1="150" x2="628.0" y2="175.0" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="628.0,186.0 623.6,175.0 632.4,175.0" fill="#94a3b8"/>
<rect x="452" y="192" width="352" height="70" rx="10" ry="10" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="468" y="212.9" font-family="DejaVu Sans Mono, monospace" font-size="11.8" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">json.loads(out) → a dict;</text>
<text x="468" y="232.9" font-family="DejaVu Sans Mono, monospace" font-size="11.8" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">use data["intent"] directly.</text>
<text x="420" y="288" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Same information — but JSON drops straight into code, prose does not.</text>
</svg>
