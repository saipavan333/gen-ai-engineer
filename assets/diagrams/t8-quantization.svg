<text x="401.0" y="218" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#94a3b8" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve"></text>
