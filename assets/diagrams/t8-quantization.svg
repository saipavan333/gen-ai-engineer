<text x="560.0" y="188.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">~3.5 GB</text>
<text x="560.0" y="218" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#94a3b8" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve"></text>
