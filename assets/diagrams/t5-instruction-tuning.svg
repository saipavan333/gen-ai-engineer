<polygon points="774.0,145.0 762.0,149.8 762.0,140.2" fill="#475569"/>
<text x="460" y="232" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Fine-tuning your own model usually means more SFT (and maybe preference tuning) on top of a base.</text>
<text x="460" y="256" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">You rarely start from scratch — you teach an already-capable model your specific behavior.</text>
