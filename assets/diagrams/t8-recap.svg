<circle cx="500" cy="116" r="4.5" fill="#15803d"/>
<text x="516" y="120" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Cache (biggest single win)</text>
<circle cx="500" cy="146" r="4.5" fill="#15803d"/>
<text x="516" y="150" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Route easy queries to cheap models</text>
<circle cx="500" cy="176" r="4.5" fill="#15803d"/>
<text x="516" y="180" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Smaller / quantized models</text>
<circle cx="500" cy="206" r="4.5" fill="#15803d"/>
<text x="516" y="210" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Trim the token budget</text>
<circle cx="500" cy="236" r="4.5" fill="#15803d"/>
<text x="516" y="240" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Batch for GPU efficiency</text>
<text x="450" y="306" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Measure first (Track 6) to find the real bottleneck, then apply the lever that targets it.</text>
