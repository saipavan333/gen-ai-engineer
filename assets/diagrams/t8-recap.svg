<rect x="0" y="0" width="900" height="320" fill="#ffffff"/>
<text x="450" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">The optimization toolkit</text>
<rect x="28" y="60" width="400" height="222" rx="14" ry="14" fill="#eff5ff" stroke="#2563eb" stroke-width="2"/>
