</defs>
<rect x="0" y="0" width="820" height="392" fill="#ffffff"/>
<text x="410" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">EU AI Act: obligations scale with risk</text>
<rect x="260" y="72.5" width="300" height="64" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="260" y="75" width="300" height="64" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="260" y="70" width="300" height="64" rx="13" ry="13" fill="url(#g_warn)" stroke="#dc2626" stroke-width="1.8"/>
<text x="410.0" y="94.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#7f1d1d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Unacceptable</text>
<text x="410.0" y="107.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">banned (e.g. social scoring)</text>
<rect x="180" y="148.5" width="460" height="64" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="180" y="151" width="460" height="64" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="180" y="146" width="460" height="64" rx="13" ry="13" fill="url(#g_key)" stroke="#d97706" stroke-width="1.8"/>
<text x="410.0" y="170.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#7c2d12" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">High-risk</text>
<text x="410.0" y="183.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">strict rules (hiring, credit, medical)</text>
<rect x="100" y="224.5" width="620" height="64" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="100" y="227" width="620" height="64" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="100" y="222" width="620" height="64" rx="13" ry="13" fill="url(#g_accent)" stroke="#4f46e5" stroke-width="1.8"/>
<text x="410.0" y="246.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#312e81" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Limited risk</text>
<text x="410.0" y="259.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">must disclose it's AI (chatbots)</text>
<rect x="20" y="300.5" width="780" height="64" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="20" y="303" width="780" height="64" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="20" y="298" width="780" height="64" rx="13" ry="13" fill="url(#g_example)" stroke="#16a34a" stroke-width="1.8"/>
<text x="410.0" y="322.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#14532d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Minimal risk</text>
<text x="410.0" y="335.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">free to use (spam filters, games)</text>
<text x="410" y="382" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Most apps are minimal or limited risk — but know your tier, because it decides what you legally must do.</text>
</svg>
