<polygon points="700,174 694,186 706,186" fill="#475569"/>
<text x="700" y="200" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">today</text>
<text x="310.0" y="190" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">knows: capitals, classic books, stable facts</text>
<text x="410" y="224" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">To answer about anything after the cutoff (or your private docs), you must supply it — that’s RAG &amp; tools.</text>
