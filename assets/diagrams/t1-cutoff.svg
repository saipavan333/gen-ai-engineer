<text x="660.0" y="156" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#b91c1c" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">model must guess</text>
<line x1="560" y1="96" x2="560" y2="184" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
