<rect x="0" y="0" width="840" height="340" fill="#ffffff"/>
<text x="420" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Anatomy of a hire-worthy GenAI repo</text>
