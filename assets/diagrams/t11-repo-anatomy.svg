<text x="330" y="104" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">decisions, trade-offs, EVAL RESULTS, “what's next”</text>
<text x="96" y="146" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1e3a8a" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">ingest.py · rag.py</text>
<text x="330" y="146" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">the working system (chunk → retrieve → ground)</text>
<rect x="76" y="172.5" width="688" height="38" rx="8" ry="8" fill="#0f172a" opacity="0.055"/>
<rect x="76" y="175" width="688" height="38" rx="8" ry="8" fill="#1e293b" opacity="0.035"/>
<rect x="76" y="170" width="688" height="38" rx="8" ry="8" fill="url(#g_key)" stroke="#d97706" stroke-width="1.8"/>
<text x="96" y="188" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#7c2d12" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">eval.py + golden.jsonl</text>
<text x="330" y="188" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">measurement — THE differentiator most repos lack</text>
