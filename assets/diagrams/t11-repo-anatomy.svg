<text x="330" y="230" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">a couple of regression tests (temp 0, structural)</text>
<text x="96" y="272" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1e293b" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">requirements.txt</text>
<text x="330" y="272" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">runs from a clean clone — clear setup steps</text>
<text x="420" y="312" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Anyone can wire an LLM to a vector store. The eval proves you can measure quality — that's the hire signal.</text>
