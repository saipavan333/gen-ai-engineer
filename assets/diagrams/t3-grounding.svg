<rect x="0" y="0" width="880" height="330" fill="#ffffff"/>
<text x="440" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Grounding: answers must come from the context</text>
<rect x="24" y="64" width="380" height="66" rx="10" ry="10" fill="#eff5ff" stroke="#2563eb" stroke-width="2"/>
<text x="40" y="86" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#1e3a8a" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">SYSTEM</text>
<text x="40" y="108" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Answer ONLY from the context below.</text>
<text x="40" y="126" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Cite sources as [n]. If absent: “I don’t know.”</text>
<rect x="24" y="142" width="380" height="78" rx="10" ry="10" fill="#fff6ea" stroke="#d97706" stroke-width="2"/>
<text x="40" y="164" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#7c2d12" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">CONTEXT</text>
<text x="40" y="186" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">[1] The X200 has a 3-year limited warranty.</text>
<text x="40" y="204" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">[2] Returns are free within 30 days.</text>
<rect x="24" y="232" width="380" height="50" rx="10" ry="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
<text x="40" y="254" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">QUESTION</text>
<text x="40" y="276" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">What’s the warranty, and can I return it?</text>
<rect x="440" y="152.5" width="96" height="70" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="440" y="155" width="96" height="70" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="440" y="150" width="96" height="70" rx="13" ry="13" fill="url(#g_accent)" stroke="#4f46e5" stroke-width="1.8"/>
<text x="488.0" y="185.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="15" fill="#312e81" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">LLM</text>
<line x1="404" y1="185" x2="426.0" y2="185.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="438.0,185.0 426.0,189.8 426.0,180.2" fill="#475569"/>
<rect x="560" y="120" width="296" height="132" rx="12" ry="12" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="708" y="146" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="13" fill="#14532d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Grounded answer</text>
<text x="576" y="172" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#14532d" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">“You get a 3-year warranty [1],</text>
<text x="576" y="194" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#14532d" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">and returns are free within</text>
<text x="576" y="216" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#14532d" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">30 days [2].”</text>
<text x="576" y="240" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#16a34a" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve" font-style="italic">every claim traces to a source</text>
<line x1="536" y1="185" x2="546.0" y2="185.0" stroke="#475569" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="558.0,185.0 546.0,189.8 546.0,180.2" fill="#475569"/>
<text x="440" y="312" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Stuff retrieved chunks in, force “only from context + cite” — now you can trust and verify.</text>
