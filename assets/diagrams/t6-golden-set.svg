<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif">
<defs>
<linearGradient id="g_concept" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eff5ff"/><stop offset="1" stop-color="#dde9ff"/></linearGradient>
<linearGradient id="g_example" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eefaf0"/><stop offset="1" stop-color="#d7f1de"/></linearGradient>
<linearGradient id="g_key" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff6ea"/><stop offset="1" stop-color="#ffecca"/></linearGradient>
<linearGradient id="g_practice" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0ff"/><stop offset="1" stop-color="#e7defb"/></linearGradient>
<linearGradient id="g_deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eafaf6"/><stop offset="1" stop-color="#d3f1ea"/></linearGradient>
<linearGradient id="g_note" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#e5edf6"/></linearGradient>
<linearGradient id="g_warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fef1ef"/><stop offset="1" stop-color="#fde2dd"/></linearGradient>
<linearGradient id="g_ink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef2f7"/><stop offset="1" stop-color="#dfe6f0"/></linearGradient>
<linearGradient id="g_plain" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fc"/></linearGradient>
<linearGradient id="g_accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0fe"/><stop offset="1" stop-color="#dfe2fd"/></linearGradient>
</defs>
<rect x="0" y="0" width="860" height="300" fill="#ffffff"/>
<text x="430" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">The golden set: your source of truth</text>
<text x="210" y="66" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">input</text>
<text x="620" y="66" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">expected output</text>
<rect x="30" y="84" width="360" height="46" rx="8" ry="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.8"/>
<text x="48" y="107" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">“How do I reset my password?”</text>
<rect x="470" y="84" width="360" height="46" rx="8" ry="8" fill="#eefaf0" stroke="#16a34a" stroke-width="1.8"/>
<text x="488" y="107" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#14532d" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Settings &gt; Security &gt; Reset</text>
<line x1="392" y1="107" x2="460.0" y2="107.0" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
<polygon points="468.0,107.0 460.0,110.2 460.0,103.8" fill="#94a3b8"/>
<rect x="30" y="142" width="360" height="46" rx="8" ry="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.8"/>
<text x="48" y="165" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">“What's your refund window?”</text>
<rect x="470" y="142" width="360" height="46" rx="8" ry="8" fill="#eefaf0" stroke="#16a34a" stroke-width="1.8"/>
<text x="488" y="165" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#14532d" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">30 days from delivery</text>
<line x1="392" y1="165" x2="460.0" y2="165.0" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
<polygon points="468.0,165.0 460.0,168.2 460.0,161.8" fill="#94a3b8"/>
<rect x="30" y="200" width="360" height="46" rx="8" ry="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.8"/>
<text x="48" y="223" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">“Ship to Antarctica?” (edge case)</text>
<rect x="470" y="200" width="360" height="46" rx="8" ry="8" fill="#eefaf0" stroke="#16a34a" stroke-width="1.8"/>
<text x="488" y="223" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#14532d" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">“I don't know / not supported”</text>
<line x1="392" y1="223" x2="460.0" y2="223.0" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
<polygon points="468.0,223.0 460.0,226.2 460.0,219.8" fill="#94a3b8"/>
<text x="430" y="284" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">A small set of real inputs + correct answers (including edge cases). Build it once; reuse it forever.</text>
</svg>
