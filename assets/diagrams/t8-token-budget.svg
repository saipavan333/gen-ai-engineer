<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif">
<defs>
<linearGradient id="g_concept" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eff5ff"/><stop offset="1" stop-color="#dde9ff"/></linearGradient>
<linearGradient id="g_example" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eefaf0"/><stop offset="1" stop-color="#d7f1de"/></linearGradient>
<linearGradient id="g_key" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff6ea"/><stop offset="1" stop-color="#ffecca"/></linearGradient>
<linearGradient id="g_practice" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0ff"/><stop offset="1" stop-color="#e7defb"/></linearGradient>
<linearGradient id="g_deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eafaf6"/><stop offset="1" stop-color="#d3f1ea"/></linearGradient>
<linearGradient id="g_note" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#e5edf6"/></linearGradient>
<linearGradient id="g_warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fef1ef"/><stop offset="1" stop-color="#fde2dd"/></linearGradient>
<linearGradient id="g_ink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef2f7"/><stop offset="1" stop-color="#dfe6f0"/></linearGradient>
<linearGradient id="g_plain" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fc"/></linearGradient>
<linearGradient id="g_accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0fe"/><stop offset="1" stop-color="#dfe2fd"/></linearGradient>
</defs>
<rect x="0" y="0" width="900" height="320" fill="#ffffff"/>
<text x="450" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Where your tokens (and cost) go</text>
<rect x="60" y="90" width="78.0" height="40" rx="4" ry="4" fill="#2563eb" stroke="#2563eb" stroke-width="0"/>
<rect x="138.0" y="90" width="156.0" height="40" rx="4" ry="4" fill="#16a34a" stroke="#16a34a" stroke-width="0"/>
<rect x="294.0" y="90" width="195.0" height="40" rx="4" ry="4" fill="#d97706" stroke="#d97706" stroke-width="0"/>
<rect x="489.0" y="90" width="234.0" height="40" rx="4" ry="4" fill="#7c3aed" stroke="#7c3aed" stroke-width="0"/>
<rect x="723.0" y="90" width="117.0" height="40" rx="4" ry="4" fill="#0d9488" stroke="#0d9488" stroke-width="0"/>
<text x="99.0" y="150" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">System</text>
<text x="99.0" y="166" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#2563eb" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">10%</text>
<text x="216.0" y="150" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Few-shot examples</text>
<text x="216.0" y="166" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#16a34a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">20%</text>
<text x="391.5" y="150" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Conversation history</text>
<text x="391.5" y="166" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#d97706" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">25%</text>
<text x="606.0" y="150" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Retrieved context</text>
<text x="606.0" y="166" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#7c3aed" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">30%</text>
<text x="781.5" y="150" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Output</text>
<text x="781.5" y="166" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#0d9488" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">15%</text>
<text x="450" y="200" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Trim levers:</text>
<text x="120" y="224" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• shorten the system prompt</text>
<text x="120" y="244" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• fewer few-shot examples (or fine-tune them in)</text>
<text x="120" y="264" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• summarize old history</text>
<text x="120" y="284" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• retrieve fewer / smaller chunks</text>
<text x="120" y="304" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">• cap max output tokens</text>
<text x="700" y="250" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Every token is paid</text>
<text x="700" y="268" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">on every call.</text>
</svg>
