<polygon points="99.0,176.0 103.8,188.0 94.2,188.0" fill="#94a3b8"/>
<text x="380" y="224" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">repeat over millions of examples — the weights slowly improve</text>
<text x="440" y="284" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">This is gradient descent. Pre-training does it on the whole web; fine-tuning does a little more on your data.</text>
</svg>
