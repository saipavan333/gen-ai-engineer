<text x="459.0" y="147.25" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">how wrong it was</text>
<rect x="574" y="112.5" width="170" height="64" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
