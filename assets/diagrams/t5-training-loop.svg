<text x="99.0" y="146.75" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">input → correct output</text>
<rect x="214" y="112.5" width="130" height="64" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
