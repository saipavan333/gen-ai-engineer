<text x="279.0" y="142.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="13.5" fill="#312e81" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Model predicts</text>
<rect x="384" y="112.5" width="150" height="64" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="384" y="115" width="150" height="64" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
