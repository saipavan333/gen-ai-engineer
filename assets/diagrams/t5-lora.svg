<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif">
<defs>
<linearGradient id="g_concept" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eff5ff"/><stop offset="1" stop-color="#dde9ff"/></linearGradient>
<linearGradient id="g_example" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eefaf0"/><stop offset="1" stop-color="#d7f1de"/></linearGradient>
<linearGradient id="g_key" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff6ea"/><stop offset="1" stop-color="#ffecca"/></linearGradient>
<linearGradient id="g_practice" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0ff"/><stop offset="1" stop-color="#e7defb"/></linearGradient>
<linearGradient id="g_deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eafaf6"/><stop offset="1" stop-color="#d3f1ea"/></linearGradient>
<linearGradient id="g_note" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#e5edf6"/></linearGradient>
<linearGradient id="g_warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fef1ef"/><stop offset="1" stop-color="#fde2dd"/></linearGradient>
<linearGradient id="g_ink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef2f7"/><stop offset="1" stop-color="#dfe6f0"/></linearGradient>
<linearGradient id="g_plain" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fc"/></linearGradient>
<linearGradient id="g_accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0fe"/><stop offset="1" stop-color="#dfe2fd"/></linearGradient>
</defs>
<rect x="0" y="0" width="880" height="340" fill="#ffffff"/>
<text x="440" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">LoRA: freeze the giant model, train a tiny adapter</text>
<rect x="60" y="110" width="240" height="120" rx="12" ry="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2.5"/>
<text x="180" y="150" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#334155" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Pretrained weights  W</text>
<text x="180" y="174" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#64748b" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">billions of params</text>
<text x="180" y="200" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#b45309" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">FROZEN — not trained</text>
<rect x="380" y="130" width="150" height="80" rx="10" ry="10" fill="#eef0fe" stroke="#4f46e5" stroke-width="2"/>
<text x="455" y="158" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="13" fill="#312e81" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">LoRA adapter</text>
<text x="455" y="180" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.5" fill="#4338ca" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">small A × B</text>
<text x="455" y="198" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="10.5" fill="#64748b" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">trainable, tiny</text>
<rect x="610" y="132.5" width="150" height="80" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="610" y="135" width="150" height="80" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
<rect x="610" y="130" width="150" height="80" rx="13" ry="13" fill="url(#g_example)" stroke="#16a34a" stroke-width="1.8"/>
<text x="685.0" y="162.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#14532d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Output</text>
<text x="685.0" y="175.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6675" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">W·x + (B·A)·x</text>
<line x1="300" y1="170" x2="369.0" y2="170.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="378.0,170.0 369.0,173.6 369.0,166.4" fill="#94a3b8"/>
<line x1="530" y1="170" x2="599.0" y2="170.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="608.0,170.0 599.0,173.6 599.0,166.4" fill="#94a3b8"/>
<text x="440" y="262" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">You train ~0.1–1% of the parameters. The big model is untouched, so adapters are tiny files you can swap.</text>
<text x="440" y="290" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#0f766e" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">QLoRA = quantize the frozen base to 4-bit first → fine-tune a big model on a single consumer GPU (free in Colab).</text>
</svg>
