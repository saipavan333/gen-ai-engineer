<line x1="270.0" y1="208" x2="270.0" y2="229.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="270.0,238.0 266.4,229.0 273.6,229.0" fill="#94a3b8"/>
<text x="296.0" y="226" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">no</text>
<text x="450" y="344" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.3" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">RAG for knowledge, prompting for instructions, fine-tuning for behavior. Try them in that order.</text>
