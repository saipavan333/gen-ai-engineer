<text x="270.0" y="92.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Needs fresh / private knowledge?</text>
<rect x="560" y="72.5" width="300" height="44" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="560" y="75" width="300" height="44" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
