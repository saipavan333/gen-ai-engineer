<rect x="0" y="0" width="900" height="360" fill="#ffffff"/>
<text x="450" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Prompt vs RAG vs fine-tune: how to choose</text>
<rect x="60" y="66.5" width="420" height="56" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
