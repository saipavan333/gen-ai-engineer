<line x1="480" y1="180" x2="549.0" y2="180.0" stroke="#15803d" stroke-width="2" stroke-linecap="round"/>
<polygon points="558.0,180.0 549.0,183.6 549.0,176.4" fill="#15803d"/>
<text x="505" y="168" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#15803d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">yes</text>
<rect x="60" y="242.5" width="420" height="70" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="60" y="245" width="420" height="70" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
