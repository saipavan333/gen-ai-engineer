<rect x="560" y="254.5" width="300" height="44" rx="13" ry="13" fill="#0f172a" opacity="0.055"/>
<rect x="560" y="257" width="300" height="44" rx="13" ry="13" fill="#1e293b" opacity="0.035"/>
