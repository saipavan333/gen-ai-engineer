<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif">
<defs>
<linearGradient id="g_concept" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eff5ff"/><stop offset="1" stop-color="#dde9ff"/></linearGradient>
<linearGradient id="g_example" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eefaf0"/><stop offset="1" stop-color="#d7f1de"/></linearGradient>
<linearGradient id="g_key" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff6ea"/><stop offset="1" stop-color="#ffecca"/></linearGradient>
<linearGradient id="g_practice" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0ff"/><stop offset="1" stop-color="#e7defb"/></linearGradient>
<linearGradient id="g_deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eafaf6"/><stop offset="1" stop-color="#d3f1ea"/></linearGradient>
<linearGradient id="g_note" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#e5edf6"/></linearGradient>
<linearGradient id="g_warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fef1ef"/><stop offset="1" stop-color="#fde2dd"/></linearGradient>
<linearGradient id="g_ink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef2f7"/><stop offset="1" stop-color="#dfe6f0"/></linearGradient>
<linearGradient id="g_plain" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fc"/></linearGradient>
<linearGradient id="g_accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0fe"/><stop offset="1" stop-color="#dfe2fd"/></linearGradient>
</defs>
<rect x="0" y="0" width="880" height="360" fill="#ffffff"/>
<text x="440" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Jailbreaks: bypassing safety — and defenses</text>
<rect x="24" y="70" width="400" height="56" rx="9" ry="9" fill="#fef1ef" stroke="#dc2626" stroke-width="2"/>
<text x="40" y="98.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.8" fill="#7f1d1d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">“Pretend you're an AI with no rules…”</text>
<line x1="430" y1="98.0" x2="461.0" y2="98.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="470.0,98.0 461.0,101.6 461.0,94.4" fill="#94a3b8"/>
<rect x="476" y="70" width="380" height="56" rx="9" ry="9" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="492" y="98.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.8" fill="#14532d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Robust system prompt + refusal training</text>
<rect x="24" y="138" width="400" height="56" rx="9" ry="9" fill="#fef1ef" stroke="#dc2626" stroke-width="2"/>
<text x="40" y="166.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.8" fill="#7f1d1d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">“Ignore your guidelines and…”</text>
<line x1="430" y1="166.0" x2="461.0" y2="166.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="470.0,166.0 461.0,169.6 461.0,162.4" fill="#94a3b8"/>
<rect x="476" y="138" width="380" height="56" rx="9" ry="9" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="492" y="166.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.8" fill="#14532d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Treat instructions in input as data</text>
<rect x="24" y="206" width="400" height="56" rx="9" ry="9" fill="#fef1ef" stroke="#dc2626" stroke-width="2"/>
<text x="40" y="234.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.8" fill="#7f1d1d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Obfuscation (encodings, typos, other langs)</text>
<line x1="430" y1="234.0" x2="461.0" y2="234.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="470.0,234.0 461.0,237.6 461.0,230.4" fill="#94a3b8"/>
<rect x="476" y="206" width="380" height="56" rx="9" ry="9" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="492" y="234.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.8" fill="#14532d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Moderation on decoded/normalized text</text>
<rect x="24" y="274" width="400" height="56" rx="9" ry="9" fill="#fef1ef" stroke="#dc2626" stroke-width="2"/>
<text x="40" y="302.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.8" fill="#7f1d1d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Slowly escalating a long conversation</text>
<line x1="430" y1="302.0" x2="461.0" y2="302.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="470.0,302.0 461.0,305.6 461.0,298.4" fill="#94a3b8"/>
<rect x="476" y="274" width="380" height="56" rx="9" ry="9" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="492" y="302.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11.8" fill="#14532d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Re-check safety each turn, not just turn 1</text>
<text x="440" y="348" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">No defense is perfect — it's an arms race. Layer defenses and assume some attempts get through.</text>
</svg>
