<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 392" width="720" height="392" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif">
<defs>
<linearGradient id="g_concept" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eff5ff"/><stop offset="1" stop-color="#dde9ff"/></linearGradient>
<linearGradient id="g_example" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eefaf0"/><stop offset="1" stop-color="#d7f1de"/></linearGradient>
<linearGradient id="g_key" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff6ea"/><stop offset="1" stop-color="#ffecca"/></linearGradient>
<linearGradient id="g_practice" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0ff"/><stop offset="1" stop-color="#e7defb"/></linearGradient>
<linearGradient id="g_deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eafaf6"/><stop offset="1" stop-color="#d3f1ea"/></linearGradient>
<linearGradient id="g_note" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f5f9"/><stop offset="1" stop-color="#e5edf6"/></linearGradient>
<linearGradient id="g_warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fef1ef"/><stop offset="1" stop-color="#fde2dd"/></linearGradient>
<linearGradient id="g_ink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef2f7"/><stop offset="1" stop-color="#dfe6f0"/></linearGradient>
<linearGradient id="g_plain" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f3f7fc"/></linearGradient>
<linearGradient id="g_accent" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef0fe"/><stop offset="1" stop-color="#dfe2fd"/></linearGradient>
</defs>
<rect x="0" y="0" width="720" height="392" fill="#ffffff"/>
<text x="360" y="30" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Inside a few-shot prompt</text>
<rect x="60" y="64" width="600" height="60" rx="10" ry="10" fill="#fff6ea" stroke="#d97706" stroke-width="2"/>
<text x="76" y="94.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#7c2d12" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Instruction</text>
<text x="210" y="94.0" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">Label each review as positive / negative.</text>
<rect x="60" y="138" width="600" height="60" rx="10" ry="10" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="76" y="168.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#14532d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Example 1</text>
<text x="210" y="168.0" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"Loved it, works great"   →   positive</text>
<line x1="360.0" y1="126" x2="360.0" y2="128.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="360.0,136.0 356.8,128.0 363.2,128.0" fill="#94a3b8"/>
<rect x="60" y="212" width="600" height="60" rx="10" ry="10" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="76" y="242.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#14532d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Example 2</text>
<text x="210" y="242.0" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"Stopped working in a week" →  negative</text>
<line x1="360.0" y1="200" x2="360.0" y2="202.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="360.0,210.0 356.8,202.0 363.2,202.0" fill="#94a3b8"/>
<rect x="60" y="286" width="600" height="60" rx="10" ry="10" fill="#eff5ff" stroke="#2563eb" stroke-width="2"/>
<text x="76" y="316.0" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#1e3a8a" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">New input</text>
<text x="210" y="316.0" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#1f2937" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">"Arrived late but works fine"  →  ?</text>
<line x1="360.0" y1="274" x2="360.0" y2="276.0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
<polygon points="360.0,284.0 356.8,276.0 363.2,276.0" fill="#94a3b8"/>
<text x="360" y="380" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12.5" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">The model simply continues the pattern — predicting “positive” as the next token.</text>
</svg>
