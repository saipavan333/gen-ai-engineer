<text x="340" y="268" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">similar prompt (embeddings) → reuse</text>
<text x="640" y="250" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#15803d" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Prefix cache</text>
<text x="640" y="268" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">reuse computed prompt prefix</text>
<text x="450" y="304" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Cache hits cost almost nothing and return instantly — huge wins for repeated queries.</text>
