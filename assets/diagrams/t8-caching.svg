<polygon points="638.0,192.0 626.0,196.8 626.0,187.2" fill="#475569"/>
<text x="64" y="250" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#2563eb" text-anchor="start" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Exact cache</text>
<text x="64" y="268" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start" font-weight="normal" dominant-baseline="middle" xml:space="preserve">same prompt → stored answer</text>
