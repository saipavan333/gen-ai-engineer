<line x1="450" y1="274" x2="488.0" y2="274.0" stroke="#16a34a" stroke-width="2.2" stroke-linecap="round"/>
<polygon points="498.0,274.0 488.0,278.0 488.0,270.0" fill="#16a34a"/>
<text x="537" y="234" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="11" fill="#16a34a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">when confident</text>
<text x="360" y="340" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Each cycle adds a thought, an action, and its observation to the context — reasoning over actions.</text>
