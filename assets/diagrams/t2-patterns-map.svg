<text x="128.0" y="108" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14.5" fill="#1e3a8a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Assign a role</text>
<text x="128.0" y="138" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">sets stance &amp; depth</text>
<rect x="246" y="64" width="200" height="116" rx="12" ry="12" fill="#eefaf0" stroke="#16a34a" stroke-width="2"/>
<text x="346.0" y="108" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14.5" fill="#14532d" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Show examples</text>
<text x="346.0" y="138" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">few-shot pins format</text>
