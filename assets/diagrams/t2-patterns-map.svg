<text x="564.0" y="276" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">allow “I don’t know”</text>
<rect x="682" y="202" width="200" height="116" rx="12" ry="12" fill="#eff5ff" stroke="#2563eb" stroke-width="2"/>
<text x="782.0" y="246" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="14.5" fill="#1e3a8a" text-anchor="middle" font-weight="bold" dominant-baseline="middle" xml:space="preserve">Ground in context</text>
<text x="782.0" y="276" font-family="Inter, ui-sans-serif, Segoe UI, Roboto, DejaVu Sans, Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="normal" dominant-baseline="middle" xml:space="preserve">supply real facts</text>
